{ph:2,set:"Abordas el avión por primera vez en el día.",t:"¿Qué corresponde hacer en tu zona antes del embarque?",o:["Preparar el carro de servicio","Asegurar tu equipaje en el lugar designado y chequear los equipos de emergencia: cantidad, ubicación y operatividad","Esperar instrucciones del Comandante en el jumpseat","Revisar los pasaportes de los pasajeros"],a:1,w:"En el pre-vuelo a bordo cada TAC asegura su equipaje y efectúa el chequeo de equipos de emergencia (EEL: cantidad, ubicación, operatividad), más elementos de servicio y aseo de cabina y baños.",s:"Día 1"},
{ph:2,set:"Durante tu chequeo encuentras una linterna de emergencia inoperativa.",t:"¿Dónde queda registrado el hallazgo?",o:["En un mensaje de WhatsApp al supervisor","En el CLB (Cabin Log Book), escrito en inglés","En la tarjeta de seguridad del asiento","No se registra si hay otra linterna"],a:1,w:"El CLB registra uso, deterioro o daño de equipos de emergencia y fallas de sistemas de cabina. Se escribe en INGLÉS y el TAC1 lo chequea antes del vuelo para constatar acciones correctivas.",s:"Día 1"},
{ph:2,set:"Te toca el chequeo de asientos de tu zona.",t:"¿Cuántos asientos revisas como mínimo y qué buscas en cada uno?",o:["Todos los asientos del avión, solo el cinturón","Al menos 8 asientos aleatorios: cinturón, cojín de flotación/salvavidas y tarjeta de seguridad","4 asientos de la primera fila","Solo los asientos de salida de emergencia"],a:1,w:"Durante el chequeo pre-vuelo se revisan AL MENOS 8 ASIENTOS ALEATORIOS de la zona asignada: cinturón de seguridad, cojín como flotación/salvavidas y tarjeta de seguridad (o de salida de emergencia si corresponde).",s:"Día 3"},

{ph:3,set:"Embarque en curso. Un pasajero sentado junto a la ventana te hace señas.",t:"Te dice: «señorita, el ala tiene como una capa de hielo». ¿Qué haces?",o:["Le explicas que el avión resiste el hielo","Reportas INMEDIATAMENTE al Comandante","Lo anotas para comentarlo en el debriefing","Avisas a mantenimiento cuando termine el embarque"],a:1,w:"Clean Aircraft Concept: prohibido despegar con hielo adherido a superficies críticas. El TAC reporta INMEDIATAMENTE al Comandante si observa o recibe información de contaminación en las alas.",s:"Día 2"},
{ph:3,set:"Sube un pasajero con un violonchelo con asiento pagado (CBBG).",t:"¿Dónde lo ubicas?",o:["En cualquier asiento libre","En asiento ventana, con el pasajero en el asiento contiguo, cubierto y sujeto con cinturón (más extensión si hace falta)","En la fila de salida de emergencia, que tiene más espacio","De pie en el galley posterior"],a:1,w:"El CBBG va en asiento VENTANA (no restringe el pasillo), pax al lado, máximo 1 asiento extra por pax, sin mercancías peligrosas, sin tapar letreros y totalmente cubierto, asegurado con el cinturón.",s:"Día 2"},
{ph:3,set:"Hoy viaja en el jumpseat 4R una inspectora ajena a la tripulación.",t:"En tu briefing le muestras cinturón/arnés, PSU, chaleco spare amarillo y la tarjeta. ¿Qué instrucción clave le das para una evacuación?",o:["«Usted salta primero por el tobogán»","«En caso de evacuación, usted deberá detener a los pasajeros mientras yo abro la puerta»","«Usted infla el tobogán con la palanca roja»","«Usted queda a cargo de dar las órdenes»"],a:1,w:"El briefing a persona ajena en jumpseat cierra con: «en caso de evacuación, usted deberá detener a los pasajeros mientras yo abro la puerta». Debe cumplir los mismos requisitos que un pax de salida de emergencia.",s:"Día 2"},
{ph:3,set:"En la fila de salida de emergencia hay un adolescente de 14 años viajando solo.",t:"¿Qué corresponde?",o:["Puede quedarse si es alto y fuerte","Reubicarlo: no cumple la edad mínima de 15 años para ocupar salida de emergencia","Pedirle autorización a los padres por teléfono","Hacerle el briefing igual y dejarlo"],a:1,w:"Para ocupar asiento en salida de emergencia se requiere al menos 15 AÑOS (además de poder operar la salida). Si un pax no cumple requisitos y rehúsa cambiarse: informar al TAC1 y al Comandante.",s:"Día 2"},
{ph:3,set:"Una pasajera embarazada de 32 semanas embarca sonriente.",t:"¿Qué debes verificar?",o:["Nada, puede volar libremente","Que cuente con Medif: entre las semanas 29 y 38 se requiere el certificado médico de compatibilidad con el vuelo","Que viaje acompañada","Que se siente cerca del baño"],a:1,w:"El Medif es exigible a embarazadas desde la semana 29 a la 38 (entre otros casos: infantes <7 días, post cirugía, infectocontagiosas, yeso en extremidad inferior, concentrador de O2…).",s:"Día 2"},

/* ============================ estado ============================ */
const KEY="oyr-pia-v1";
let S={stats:{},best:0,exams:[],flights:[],daily:{last:null,streak:0,best:0},ach:{}};
try{const raw=localStorage.getItem(KEY); if(raw) S=Object.assign(S,JSON.parse(raw));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function stat(i){return S.stats[i]||(S.stats[i]={s:0,r:0,w:0,last:null});}

/* dominio: última respuesta correcta */
function catMastery(c){
  const qs=QS.map((q,i)=>({q,i})).filter(x=>x.q.c===c);
  const dom=qs.filter(x=>{const st=S.stats[x.i];return st&&st.last==="r";}).length;
  return {dom,total:qs.length,pct:qs.length?Math.round(dom/qs.length*100):0};
}
function totalMastery(){
  let dom=0;for(let i=0;i<QS.length;i++){const st=S.stats[i];if(st&&st.last==="r")dom++;}
  return Math.round(dom/QS.length*100);
}
function answeredCount(){return Object.values(S.stats).filter(st=>st.s>0).length;}
function failedIdx(){return QS.map((q,i)=>i).filter(i=>{const st=S.stats[i];return st&&st.last==="w";});}

/* ---------- rangos, racha diaria y logros ---------- */
const RANKS=[["Alumna",0],["TAC 4",15],["TAC 3",35],["TAC 2",55],["TAC 1",75],["Jefa de Cabina",90]];
function examPassed(){return (S.exams||[]).some(e=>e.pct>=80);}
function rankIdx(){
  const m=totalMastery();let r=0;
  RANKS.forEach((rk,i)=>{if(m>=rk[1])r=i;});
  if(r===5&&!examPassed())r=4;
  return r;
}
function fmtDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayStr(){return fmtDate(new Date());}
function yesterdayStr(){const d=new Date();return fmtDate(new Date(d.getFullYear(),d.getMonth(),d.getDate()-1));}
const ACH=[
  {id:"primera",icon:"🛫",n:"Primer despegue",d:"Responde tu primera pregunta",f:()=>answeredCount()>=1},
  {id:"zona",icon:"✅",n:"Zona dominada",d:"Lleva una categoría al 80%",f:()=>CATS.some((c,i)=>catMastery(i).pct>=80)},
  {id:"cabina",icon:"🗺",n:"Cabina completa",d:"Las 5 categorías al 80%",f:()=>CATS.every((c,i)=>catMastery(i).pct>=80)},
  {id:"punteria",icon:"🎯",n:"Puntería",d:"Racha de 10 seguidas en la ruleta",f:()=>S.best>=10},
  {id:"aprobada",icon:"🎓",n:"Aprobada",d:"Un examen con 80% o más",f:()=>(S.exams||[]).some(e=>e.pct>=80)},
  {id:"excelencia",icon:"🌟",n:"Excelencia",d:"Un examen con 95% o más",f:()=>(S.exams||[]).some(e=>e.pct>=95)},
  {id:"evac90",icon:"🛝",n:"Evacuación en 90 segundos",d:"Secuencia de puertas perfecta en el simulador",f:()=>false},
  {id:"impecable",icon:"👩‍✈️",n:"Vuelo impecable",d:"Un turno de vuelo con 95% o más",f:()=>(S.flights||[]).some(x=>x.pct>=95)},
  {id:"semana",icon:"🔥",n:"Semana en el aire",d:"7 días seguidos de vuelo del día",f:()=>(S.daily.best||0)>=7},
  {id:"quincena",icon:"🚀",n:"Quincena imparable",d:"15 días seguidos de vuelo del día",f:()=>(S.daily.best||0)>=15},
  {id:"jefa",icon:"👑",n:"Jefa de Cabina",d:"Alcanza el rango máximo",f:()=>rankIdx()>=5}
];
let toastQ=[],toastBusy=false;
function toast(msg){toastQ.push(msg);if(!toastBusy)nextToast();}
function nextToast(){
  const m=toastQ.shift();
  if(m==null){toastBusy=false;return;}
  toastBusy=true;
  const t=document.createElement("div");t.className="toast";t.textContent=m;
  document.body.appendChild(t);
  setTimeout(()=>{t.remove();nextToast();},2000);
}
function unlock(id,name){if(S.ach[id])return;S.ach[id]=todayStr();save();toast("🏅 Logro desbloqueado: "+name);}
function checkAch(){ACH.forEach(a=>{if(!S.ach[a.id]&&a.f())unlock(a.id,a.n);});}

/* selección ponderada: no vistas pesan 4; falladas pesan más */
let recent=[];
function pickQ(cat){
  let pool=QS.map((q,i)=>({q,i})).filter(x=>cat==null||x.q.c===cat);
  const fresh=pool.filter(x=>!recent.includes(x.i));
  if(fresh.length>=3)pool=fresh;
  let total=0;const weights=pool.map(x=>{
    const st=S.stats[x.i];let w;
    if(!st||st.s===0)w=4;
    else w=1+3*(st.w/(st.r+st.w||1))+(st.last==="w"?2:0);
    total+=w;return w;
  });
  let r=Math.random()*total;
  for(let k=0;k<pool.length;k++){r-=weights[k];if(r<=0){remember(pool[k].i);return pool[k].i;}}
  remember(pool[pool.length-1].i);return pool[pool.length-1].i;
}
function remember(i){recent.push(i);if(recent.length>8)recent.shift();}
function record(i,ok){
  const st=stat(i);st.s++;ok?st.r++:st.w++;st.last=ok?"r":"w";save();checkAch();
}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ---------- RULETA ---------- */
let wheelRot=0;
function Wheel(){
  const el=document.createElement("div");el.className="screen";
  el.innerHTML=`
    <button class="backbtn">← Menú</button>
    <div class="eyebrow">Modo ruleta</div>
    <h2>Gira y responde</h2>
    <p class="sub">La ruleta favorece un poquito tus categorías más débiles.</p>
    <div class="wheelwrap">
      <div class="hud">
        <div class="stat"><b id="hudStreak">${session.streak}</b><span>Racha</span></div>
        <div class="stat"><b id="hudPts">${session.points}</b><span>Puntos</span></div>
        <div class="stat"><b>${S.best}</b><span>Récord</span></div>
      </div>
      <div class="wheelbox">
        <div class="pointer"></div>
        <svg viewBox="-110 -110 220 220" aria-label="Ruleta de categorías"><g id="wheelG"></g>
          <circle r="26" fill="var(--card)" stroke="var(--line)" stroke-width="2"></circle>
          <text y="7" text-anchor="middle" font-size="20">✈</text>
        </svg>
      </div>
      <button class="spin-btn" id="spinBtn">Girar</button>
    </div>`;
  el.querySelector(".backbtn").addEventListener("click",()=>go(Home));
  view.appendChild(el);
  const g=el.querySelector("#wheelG");
  CATS.forEach((c,i)=>{
    const a0=(i*72-90)*Math.PI/180, a1=((i+1)*72-90)*Math.PI/180, R=104;
    const x0=Math.cos(a0)*R,y0=Math.sin(a0)*R,x1=Math.cos(a1)*R,y1=Math.sin(a1)*R;
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M0 0 L${x0.toFixed(2)} ${y0.toFixed(2)} A${R} ${R} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z`);
    p.style.fill=`var(--c${i})`;
    p.style.stroke="var(--ground)";p.setAttribute("stroke-width","2.5");
    g.appendChild(p);
    const mid=(i*72+36-90)*Math.PI/180, r2=66;
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",(Math.cos(mid)*r2).toFixed(1));t.setAttribute("y",(Math.sin(mid)*r2).toFixed(1));
    t.setAttribute("text-anchor","middle");t.setAttribute("dominant-baseline","middle");
    t.setAttribute("font-size","9.5");t.setAttribute("font-weight","800");t.setAttribute("fill","#fff");
    t.setAttribute("transform",`rotate(${i*72+36} ${(Math.cos(mid)*r2).toFixed(1)} ${(Math.sin(mid)*r2).toFixed(1)})`);
    t.textContent=CATS[i].short.toUpperCase();
    g.appendChild(t);
  });
  g.style.transform=`rotate(${wheelRot}deg)`;
  el.querySelector("#spinBtn").addEventListener("click",()=>{
    const btn=el.querySelector("#spinBtn");btn.disabled=true;
    /* categoría ponderada por debilidad */
    let tot=0;const ws=CATS.map((c,i)=>{const m=catMastery(i);const w=1+(100-m.pct)/40;tot+=w;return w;});
    let r=Math.random()*tot,cat=0;
    for(let i=0;i<5;i++){r-=ws[i];if(r<=0){cat=i;break;}}
    const jitter=(Math.random()*44-22);
    const target=-(cat*72+36)+jitter;
    const cur=((wheelRot%360)+360)%360;
    wheelRot+=5*360+((((target-cur)%360)+360)%360);
    g.style.transform=`rotate(${wheelRot}deg)`;
    const reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
    setTimeout(()=>{
      go(Question,{cat,mode:"wheel"});
    },reduced?150:3500);
  });
}

/* ---------- PREGUNTA (compartida) ---------- */
function Question(ctx){
  const qi=ctx.qi!=null?ctx.qi:pickQ(ctx.cat);
  const q=QS[qi];const cat=CATS[q.c];
  const order=shuffle(q.o.map((_,k)=>k));
  const el=document.createElement("div");el.className="screen";
  const counter=ctx.total?`<span class="q-count">PREG ${String(ctx.n).padStart(2,"0")}/${ctx.total}</span>`:
    `<span class="q-count">RACHA ${session.streak}</span>`;
  el.innerHTML=`
    <button class="backbtn">← ${ctx.mode==="wheel"?"Ruleta":ctx.mode==="exam"?"Abandonar examen":"Salir"}</button>
    <div class="q-meta">
      <span class="chip" style="background:${cat.color}">${cat.code} · ${cat.short}</span>
      ${counter}
    </div>
    <div class="q-card">
      <div class="q-text">${esc(q.q)}</div>
      <div class="opts"></div>
      <div class="after"></div>
    </div>`;
  el.querySelector(".backbtn").addEventListener("click",()=>{
    if(ctx.mode==="wheel")go(Wheel); else if(ctx.mode==="study")go(CatPick); else go(Home);
  });
  const opts=el.querySelector(".opts");
  const letters=["A","B","C","D"];
  let answered=false;
  order.forEach((oi,k)=>{
    const b=document.createElement("button");b.className="opt";
    b.innerHTML=`<span class="key">${letters[k]}</span><span>${esc(q.o[oi])}</span>`;
    b.addEventListener("click",()=>{
      if(answered)return;answered=true;
      const ok=oi===q.a;
      [...opts.children].forEach((btn,j)=>{
        btn.disabled=true;
        if(order[j]===q.a)btn.classList.add("correct");
        else if(j===k&&!ok)btn.classList.add("wrong");
        else btn.classList.add("dim");
      });
      if(ctx.mode!=="exam")record(qi,ok);
      if(ctx.mode==="wheel"){
        if(ok){session.streak++;session.points+=10+Math.min(session.streak,5)*2;if(session.streak>S.best){S.best=session.streak;save();}}
        else session.streak=0;
      }
      const after=el.querySelector(".after");
      const cheers=["¡Eso, tripulante! 🛫","¡Perfecto! ✨","¡Cabina libre! ✅","¡Directo al mando! 👩‍✈️","¡Correctísimo! 🎯"];
      const ouch=["Casi… mira el porqué 👇","No era esa, pero ahora no se te olvida:","A revisar el detalle:","Tranquila, esta cae de nuevo:"];
      const head=ok?cheers[Math.floor(Math.random()*cheers.length)]:ouch[Math.floor(Math.random()*ouch.length)];
      let extra="";
      if(ctx.mode!=="exam"){
        extra=`<div class="why">${esc(q.w)}<span class="src">Fuente: ${q.s} · OYR ALAS</span></div>`;
      }
      after.innerHTML=`<div class="verdict ${ok?"ok":"bad"}">${ok?"✔":"✘"} ${head}</div>${extra}
        <button class="next-btn">${ctx.mode==="exam"?(ctx.n<ctx.total?"Siguiente pregunta →":"Ver resultado ✈"):"Continuar →"}</button>`;
      after.querySelector(".next-btn").addEventListener("click",()=>ctx.onNext(qi,oi,ok));
      after.querySelector(".next-btn").focus();
    });
    opts.appendChild(b);
  });
  const keyH=(ev)=>{
    const idx="1234".indexOf(ev.key);
    if(idx>=0&&idx<order.length&&!answered){opts.children[idx].click();}
  };
  document.addEventListener("keydown",keyH,{once:false});
  view.appendChild(el);
  /* limpia el listener al cambiar de vista */
  const obs=new MutationObserver(()=>{if(!document.body.contains(el)){document.removeEventListener("keydown",keyH);obs.disconnect();}});
  obs.observe(view,{childList:true});
}

function startStudy(cat){
  const idxs=QS.map((q,i)=>i).filter(i=>QS[i].c===cat);
  idxs.sort((a,b)=>{
    const sa=S.stats[a],sb=S.stats[b];
    const ka=sa?(sa.last==="w"?0:sa.s?2:1):1, kb=sb?(sb.last==="w"?0:sb.s?2:1):1;
    return ka-kb||Math.random()-0.5;
  });
  runSeq(idxs,"study",cat);
}
function runSeq(idxs,mode,cat){
  let n=0,rights=0;
  const step=()=>{
    if(n>=idxs.length){go(SeqDone,{rights,total:idxs.length,mode,cat});return;}
    go(Question,{qi:idxs[n],mode,n:n+1,total:idxs.length,cat,onNext:(qi,oi,ok)=>{if(ok)rights++;n++;step();}});
  };
  step();
}
function SeqDone(r){
  const el=document.createElement("div");el.className="screen";
  const pct=Math.round(r.rights/r.total*100);
  const nice=pct>=80;
  let extra="";
  if(r.mode==="daily"){
    const t=todayStr();
    if(S.daily.last!==t){
      S.daily.streak=(S.daily.last===yesterdayStr())?S.daily.streak+1:1;
      S.daily.last=t;S.daily.best=Math.max(S.daily.best||0,S.daily.streak);
      save();
    }
    checkAch();
    extra=`<p class="sub" style="margin-top:10px">🔥 Racha: <b>${S.daily.streak} día${S.daily.streak===1?"":"s"}</b> — nos vemos mañana para la siguiente dosis.</p>`;
  }
  const title=r.mode==="redo"?"Repaso de errores":r.mode==="daily"?"Vuelo del día":"Estudio · "+CATS[r.cat].name;
  const subTxt=r.mode==="daily"
    ?(nice?"Dosis del día cumplida con estilo.":"Dosis cumplida — lo que fallaste volverá a aparecer hasta que caiga.")
    :(nice?"¡Zona dominada! Sigue así y el examen será un paseo.":"Buen avance — las que fallaste volverán a aparecer hasta que caigan.");
  el.innerHTML=`
    <div class="result-hero">
      <div class="eyebrow">${title}</div>
      <div class="score">${r.rights}/${r.total}</div>
      <p class="sub">${subTxt}</p>
      <span class="stamp ${nice?"ok":"bad"}">${r.mode==="daily"?"Hecho por hoy":nice?"Zona OK":"En progreso"}</span>

      <button id="again">Repetir</button>
      <button class="primary" id="menu">Volver al menú</button>
    </div>`;
  el.querySelector("#again").addEventListener("click",()=>{r.mode==="redo"?go(Redo):r.mode==="daily"?runDaily():startStudy(r.cat);});
  el.querySelector("#menu").addEventListener("click",()=>go(Home));
  view.appendChild(el);
  if(nice)confetti();
}

  el.querySelector("#goExam").addEventListener("click",runExam);

function runExam(){
  /* 4 por categoría */
  let sel=[];
  CATS.forEach((c,ci)=>{
    const pool=shuffle(QS.map((q,i)=>i).filter(i=>QS[i].c===ci));
    sel=sel.concat(pool.slice(0,4));
  });
  sel=shuffle(sel);
  const answers=[];const t0=Date.now();
  let n=0;
  const tick=()=>{};
  const step=()=>{
    if(n>=sel.length){go(finishExam,sel,answers,Date.now()-t0);return;}
    go(Question,{qi:sel[n],mode:"exam",n:n+1,total:sel.length,onNext:(qi,oi,ok)=>{
      answers.push({qi,oi,ok});record(qi,ok);n++;step();
    }});
    /* timer chip */
    const meta=view.querySelector(".q-meta");
    if(meta){
      const t=document.createElement("span");t.className="timer";
      meta.appendChild(t);
      if(examT)clearInterval(examT);
      examT=setInterval(()=>{
        const s=Math.floor((Date.now()-t0)/1000);
        t.textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
      },1000);
    }
  };
  step();
}
function finishExam(sel,answers,ms){
  if(examT){clearInterval(examT);examT=null;}
  const right=answers.filter(a=>a.ok).length;
  const pct=Math.round(right/sel.length*100);
  const pass=pct>=80;
  const mins=Math.floor(ms/60000),secs=Math.floor(ms/1000)%60;
  S.exams.push({d:new Date().toISOString().slice(0,10),pct,right,total:sel.length,t:`${mins}:${String(secs).padStart(2,"0")}`});
  if(S.exams.length>12)S.exams=S.exams.slice(-12);
  save();checkAch();
  const el=document.createElement("div");el.className="screen";
  const wrongs=answers.filter(a=>!a.ok);
  el.innerHTML=`
    <div class="result-hero">
      <div class="eyebrow">Resultado del examen · ${mins}:${String(secs).padStart(2,"0")} min</div>
      <div class="score">${pct}%</div>
      <p class="sub">${right} de ${sel.length} correctas</p>
      <span class="stamp ${pass?"ok":"bad"}">${pass?(pct>=95?"Excelencia":"Aprobado"):"Reintentar"}</span>
      <p class="sub" style="margin-top:12px">${pass?(pct>=95?"Nivel jefa de cabina. Impecable, "+NOMBRE+" 👑":"¡Aprobado! El cielo te queda cerca ✈"):"Aún no — revisa abajo tus errores con la explicación y vuelve a intentarlo."}</p>
    </div>
    ${wrongs.length?`<h2 style="margin-top:22px">Revisión de errores</h2><div class="review-list"></div>`:""}
    <div class="flash-nav" style="margin-top:18px">
      <button id="again">Nuevo examen</button>
      <button class="primary" id="menu">Volver al menú</button>
    </div>`;
  const list=el.querySelector(".review-list");
  if(list)wrongs.forEach(a=>{
    const q=QS[a.qi];
    const d=document.createElement("div");d.className="review-item";
    d.innerHTML=`<div class="rq">${esc(q.q)}</div>
      <div class="ra">Tu respuesta: <b class="badtxt">${esc(q.o[a.oi])}</b><br>Correcta: <b class="good">${esc(q.o[q.a])}</b></div>
      <div class="why" style="margin-top:9px">${esc(q.w)}<span class="src">Fuente: ${q.s} · OYR ALAS</span></div>`;
    list.appendChild(d);
  });
  el.querySelector("#again").addEventListener("click",runExam);
  el.querySelector("#menu").addEventListener("click",()=>go(Home));
  view.appendChild(el);
  if(pass)confetti();
}

  });

    [...chips.children].forEach((b,k)=>b.classList.toggle("on",cat==null?k===0:k===cat+1));

    const c=CARDS[deck[i]];const catc=CATS[c.c];
    flash.classList.remove("flipped");
    el.querySelector(".front").innerHTML=`<span class="chip" style="background:${catc.color}">${catc.short}</span>
      <div class="fq">${esc(c.f)}</div><span class="hint">Tarjeta ${i+1}/${deck.length} · toca para ver</span>`;
    el.querySelector(".back").innerHTML=`<div class="fa">${esc(c.b)}</div><span class="hint">Fuente: OYR ALAS</span>`;
  }
  flash.addEventListener("click",()=>flash.classList.toggle("flipped"));
  flash.addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();flash.classList.toggle("flipped");}});
  el.querySelector("#next").addEventListener("click",()=>{i=(i+1)%deck.length;render();});
  el.querySelector("#prev").addEventListener("click",()=>{i=(i-1+deck.length)%deck.length;render();});
  view.appendChild(el);

}

    <p class="sub">Eres TAC en un A320, ruta SCL → Lima. Vas a vivir el vuelo completo en ${SIM_PICK.reduce((a,b)=>a+b,0)} decisiones: cada fase trae situaciones reales y el crucero trae eventos sorpresa distintos en cada turno. Al final recibes tu informe de vuelo.</p>
    ${best!=null?`<p class="sub" style="margin-top:6px">Tu mejor turno: <b>${best}%</b></p>`:""}
    <div class="modes" style="margin-top:18px">
      <button class="pass" id="goSim">
        <span class="pass-main"><h3>Embarcar ✈</h3><p>Del briefing al debriefing. Cada corrida es distinta: vale la pena repetirla.</p>
        <span class="tagline">Puerta 1L · abierta</span></span>
        <span class="pass-stub"><span class="big">🧭</span><span>SIM</span><span>SCL→LIM</span></span>
      </button>
    </div>`;
  el.querySelector(".backbtn").addEventListener("click",()=>go(Home));
  el.querySelector("#goSim").addEventListener("click",runSim);
  view.appendChild(el);
}
function runSim(){
  const plan=[];
  SIM_PHASES.forEach((p,pi)=>{
    const pool=SIM.filter(n=>n.ph===pi);
    const must=pool.filter(n=>n.must);
    const rest=shuffle(pool.filter(n=>!n.must));
    plan.push(...must.concat(rest).slice(0,SIM_PICK[pi]));
  });
  const scores=SIM_PHASES.map(()=>({r:0,t:0}));
  let i=0;
  const step=()=>{
    if(i>=plan.length){go(SimReport,scores);return;}
    go(SimNode,plan[i],scores,()=>{i++;step();},i,plan.length);
  };
  step();
}
function simHead(node,idx,total){
  const ph=SIM_PHASES[node.ph];
  const dots=SIM_PHASES.map((p,k)=>`<span class="fp-dot ${k<node.ph?"done":k===node.ph?"cur":""}" title="${p.t}"></span>`).join("");
  return `<button class="backbtn">← Abandonar turno</button>
    <div class="q-meta">
      <span class="chip" style="background:var(--accent)">${ph.icon} ${ph.t}</span>
      <span class="q-count">DEC ${String(idx+1).padStart(2,"0")}/${total}</span>
    </div>
    <div class="flightpath">${dots}</div>`;
}
function SimNode(node,scores,onNext,idx,total){
  if(node.type==="order"){SimOrder(node,scores,onNext,idx,total);return;}
  const el=document.createElement("div");el.className="screen";
  const order=shuffle(node.o.map((_,k)=>k));
  el.innerHTML=`${simHead(node,idx,total)}
    <div class="q-card">
      ${node.set?`<div class="scene-setup">${esc(node.set)}</div>`:""}
      <div class="q-text">${esc(node.t)}</div>
      <div class="opts"></div><div class="after"></div>
    </div>`;
  el.querySelector(".backbtn").addEventListener("click",()=>go(Home));
  const opts=el.querySelector(".opts");
  const letters=["A","B","C","D"];let answered=false;
  order.forEach((oi,k)=>{
    const b=document.createElement("button");b.className="opt";
    b.innerHTML=`<span class="key">${letters[k]}</span><span>${esc(node.o[oi])}</span>`;
    b.addEventListener("click",()=>{
      if(answered)return;answered=true;
      const ok=oi===node.a;
      scores[node.ph].t++;if(ok)scores[node.ph].r++;
      [...opts.children].forEach((btn,j)=>{
        btn.disabled=true;
        if(order[j]===node.a)btn.classList.add("correct");
        else if(j===k&&!ok)btn.classList.add("wrong");
        else btn.classList.add("dim");
      });
      const after=el.querySelector(".after");
      after.innerHTML=`<div class="verdict ${ok?"ok":"bad"}">${ok?"✔ Buena decisión, tripulante":"✘ En el vuelo real esto importa — mira:"}</div>
        <div class="why">${esc(node.w)}<span class="src">Fuente: ${node.s} · OYR ALAS</span></div>
        <button class="next-btn">Continuar el vuelo →</button>`;
      after.querySelector(".next-btn").addEventListener("click",onNext);
      after.querySelector(".next-btn").focus();
    });
    opts.appendChild(b);
  });
  view.appendChild(el);
}
function SimOrder(node,scores,onNext,idx,total){
  const el=document.createElement("div");el.className="screen";
  let pool=shuffle(node.items.map((_,k)=>k));
  let built=[];
  el.innerHTML=`${simHead(node,idx,total)}
    <div class="q-card">
      <div class="q-text">${esc(node.t)}</div>
      <div class="seq-built"></div>
      <div class="seq-hint">Toca un paso de tu secuencia para devolverlo abajo.</div>
      <div class="opts"></div><div class="after"></div>
    </div>`;
  el.querySelector(".backbtn").addEventListener("click",()=>go(Home));
  const builtBox=el.querySelector(".seq-built");
  const opts=el.querySelector(".opts");
  let done=false;
  function render(){
    builtBox.innerHTML="";opts.innerHTML="";
    built.forEach((ii,pos)=>{
      const c=document.createElement("button");c.className="seq-chip";
      c.innerHTML=`<span class="n">${pos+1}.</span><span>${esc(node.items[ii])}</span>`;
      c.addEventListener("click",()=>{if(done)return;built.splice(pos,1);pool.push(ii);render();});
      builtBox.appendChild(c);
    });
    pool.forEach(ii=>{
      const b=document.createElement("button");b.className="opt";
      b.innerHTML=`<span class="key">·</span><span>${esc(node.items[ii])}</span>`;
      b.addEventListener("click",()=>{if(done)return;pool=pool.filter(x=>x!==ii);built.push(ii);render();});
      opts.appendChild(b);
    });
    if(!pool.length&&!done){
      const btn=document.createElement("button");btn.className="next-btn";btn.textContent="Confirmar secuencia ✔";
      btn.addEventListener("click",()=>{
        done=true;
        const ok=built.every((ii,pos)=>ii===pos);
        scores[node.ph].t++;if(ok){scores[node.ph].r++;unlock("evac90","Evacuación en 90 segundos");}
        const after=el.querySelector(".after");
        const correcta=node.items.map((s,k)=>`${k+1}. ${esc(s)}`).join("<br>");
        after.innerHTML=`<div class="verdict ${ok?"ok":"bad"}">${ok?"✔ Secuencia perfecta — así se opera":"✘ El orden correcto era:"}</div>
          <div class="why">${ok?esc(node.w):correcta+"<br><br>"+esc(node.w)}<span class="src">Fuente: ${node.s} · OYR ALAS</span></div>
          <button class="next-btn">Continuar el vuelo →</button>`;
        after.querySelector(".next-btn").addEventListener("click",onNext);
        opts.innerHTML="";
        [...builtBox.children].forEach(c=>c.disabled=true);
      });
      opts.appendChild(btn);
    }
  }
  render();
  view.appendChild(el);
}
function SimReport(scores){
  const right=scores.reduce((a,s)=>a+s.r,0), tot=scores.reduce((a,s)=>a+s.t,0);
  const pct=Math.round(right/tot*100);
  const pass=pct>=80;
  S.flights=S.flights||[];
  S.flights.push({d:new Date().toISOString().slice(0,10),pct,right,total:tot});
  if(S.flights.length>12)S.flights=S.flights.slice(-12);
  save();checkAch();
  const el=document.createElement("div");el.className="screen";
  el.innerHTML=`
    <div class="result-hero">
      <div class="eyebrow">Informe de vuelo · SCL → LIM</div>
      <div class="score">${pct}%</div>
      <p class="sub">${right} de ${tot} decisiones correctas</p>
      <span class="stamp ${pass?"ok":"bad"}">${pct>=95?"Vuelo impecable":pass?"Vuelo completado":"Vuelo con observaciones"}</span>
      <p class="sub" style="margin-top:12px">${pct>=95?"Ni una observación en el informe. Nivel instructora, "+NOMBRE+" 👑":pass?"Turno cumplido — el informe va limpio al debriefing ✈":"El Comandante anotó observaciones: repite el turno, los eventos cambian cada vez."}</p>
      <div style="margin-top:16px">${scores.map((s,k)=>`<div class="report-phase"><span>${SIM_PHASES[k].icon}</span><span class="rp-name">${SIM_PHASES[k].t}</span><span class="rp-score ${s.r===s.t?"good":"meh"}">${s.r}/${s.t}</span></div>`).join("")}</div>
    </div>
    <div class="flash-nav" style="margin-top:18px">
      <button id="again">Nuevo turno</button>
      <button class="primary" id="menu">Volver al menú</button>
    </div>`;
  el.querySelector("#again").addEventListener("click",runSim);
  el.querySelector("#menu").addEventListener("click",()=>go(Home));
  view.appendChild(el);
  if(pass)confetti();
}

  let t=0;
  const tryOpen=()=>{
    if(inp.value.replace(/\D/g,"")==="04061997"){openLove();}

  inp.addEventListener("keydown",e=>{if(e.key==="Enter")tryOpen();});

  inp.focus();
}

      setTimeout(()=>s.remove(),9000);

/* ---------- confetti ---------- */
function confetti(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches)return;
  const colors=["var(--c0)","var(--c1)","var(--c2)","var(--c3)","var(--c4)"];
  for(let k=0;k<70;k++){
    const d=document.createElement("div");d.className="confetti";
    d.style.left=Math.random()*100+"vw";
    d.style.width=6+Math.random()*6+"px";d.style.height=8+Math.random()*8+"px";
    d.style.background=colors[k%5];
    d.style.animationDuration=2.2+Math.random()*2+"s";
    d.style.animationDelay=Math.random()*0.6+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),5200);
  }
}

/* rutas de "siguiente" para el modo ruleta */
function wheelCtx(){return {cat:null,mode:"wheel",onNext:()=>go(Wheel)};}
/* parche: el modo ruleta usa Question con onNext → volver a la ruleta */
const _Question=Question;
Question=function(ctx){
  if(ctx.mode==="wheel"&&!ctx.onNext)ctx.onNext=()=>go(Wheel);
  _Question(ctx);
};
